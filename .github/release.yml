# Configuration for auto-generated release notes
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
      - question
    authors:
      - dependabot
      - dependabot[bot]

  categories:
    - title: "New Features"
      labels:
        - enhancement
    - title: "Bug Fixes"
      labels:
        - bug
    - title: "DLC & Content"
      labels:
        - dlc
    - title: "GreenLuma"
      labels:
        - greenluma
    - title: "CDN & Downloads"
      labels:
        - cdn
    - title: "User Experience"
      labels:
        - ux
    - title: "Performance"
      labels:
        - performance
    - title: "Security"
      labels:
        - security
    - title: "CI/CD & Build"
      labels:
        - ci/cd
    - title: "Testing"
      labels:
        - testing
    - title: "Documentation"
      labels:
        - documentation
    - title: "Dependencies"
      labels:
        - dependencies
    - title: "Other Changes"
      labels:
        - "*"
