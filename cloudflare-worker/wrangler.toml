name = "sims4-cdn"
main = "worker.js"
compatibility_date = "2025-12-01"

# Route: cdn.hyperabyss.com/* → this worker
# Set in Cloudflare dashboard: Workers & Pages → sims4-cdn → Settings → Triggers

# KV Namespace — stores path → seedbox URL mappings
[[kv_namespaces]]
binding = "CDN_ROUTES"
id = "21b161fd30af47d19c4b298f597ff259"

# Environment variables (secrets set via `wrangler secret put`):
#   SEEDBOX_BASE_URL  — e.g. https://spirit.whatbox.ca/toastytoast/
#   SEEDBOX_USER      — seedbox HTTP auth user
#   SEEDBOX_PASS      — seedbox HTTP auth password
#   SUPABASE_URL      — e.g. https://yourproject.supabase.co
#   SUPABASE_SERVICE_KEY — Supabase service_role key
#   JWT_SECRET        — shared secret for JWT signing (same as api worker)
